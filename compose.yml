name: appclimb

services:
  migrate:
    image: appclimb-api:1.0.0
    build:
      context: ./worker
      dockerfile: Dockerfile
    command: ["/appclimb-api", "-migrate-only"]
    restart: "no"
    env_file:
      - .env.admin
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "2"
    networks:
      - internal

  api:
    image: appclimb-api:1.0.0
    build:
      context: ./worker
      dockerfile: Dockerfile
    command: ["/appclimb-api"]
    restart: unless-stopped
    init: true
    env_file:
      - .env.runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/appclimb-api", "-healthcheck"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      internal:
      ingress:
        aliases:
          - appclimb-api

  worker:
    image: appclimb-api:1.0.0
    command: ["/appclimb-worker"]
    restart: unless-stopped
    init: true
    env_file:
      - .env.runtime
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/appclimb-worker", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - internal

  db:
    image: postgres:16.9-alpine3.22
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: appclimb
      POSTGRES_USER: appclimb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appclimb -d appclimb"]
      interval: 10s
      timeout: 5s
      retries: 8
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - internal

networks:
  internal:
    internal: true
  ingress:
    external: true
    name: hortiops_default

volumes:
  postgres-data:
